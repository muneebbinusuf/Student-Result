<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Result Portal</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#4a90e2,#145ca8);
  margin:0;
  display:flex;
  justify-content:center;
  padding:40px;
}

.box {
  background:#fff;
  padding:25px;
  width:420px;
  border-radius:10px;
}

input, select {
  width:100%;
  padding:10px;
  margin:10px 0;
}

button {
  width:100%;
  padding:10px;
  background:#145ca8;
  color:#fff;
  border:none;
  cursor:pointer;
}

iframe {
  width:100%;
  height:500px;
  border:none;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
<h2>Student Result Portal</h2>

<input id="enroll" placeholder="Enrollment">
<select id="sem">
  <option value="">Semester</option>
  <option>1</option><option>2</option><option>3</option>
  <option>4</option><option>5</option><option>6</option>
  <option>7</option><option>8</option>
</select>

<button onclick="search()">Search</button>

<div id="out"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxqi_qnEnvLk5ZuYjI_BfwV-X5imaGrlr_A92QndsSfvUDy9pqLRKPgPa8tzN1B0VaI/exec";

async function search() {
  const e = enroll.value;
  const s = sem.value;
  out.innerHTML = "Loading...";

  const res = await fetch(`${API}?enrollment=${e}&semester=${s}`);
  const data = await res.json();

  if (!data.length) {
    out.innerHTML = "No result";
    return;
  }

  const r = data[0];

  const pdf = `${API}?fileId=${r.FileId}`;
  const download = `https://drive.google.com/uc?export=download&id=${r.FileId}`;

  out.innerHTML = `
    <h3>${r.Course}</h3>
    <p>Semester: ${r.Semester}</p>

    <a href="${download}" target="_blank">Download PDF</a>

    <iframe src="${pdf}"></iframe>
  `;
}
</script>

</body>
</html>
