<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Result Portal</title>

  <style>
    /* (UNCHANGED YOUR CSS - KEPT AS IT IS) */
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #4a90e2 0%, #145ca8 100%);
      color: #222;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }
    .container {
      background: #fff;
      max-width: 440px;
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 14px 30px rgba(20, 92, 168, 0.25);
      padding: 30px 40px;
      text-align: center;
    }
    .title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #145ca8;
    }
    .subtitle {
      font-size: 1rem;
      color: #4a90e2;
      margin-bottom: 28px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 22px;
      text-align: left;
    }
    label {
      font-weight: 600;
      margin-bottom: 6px;
      color: #1a237e;
      font-size: 0.95rem;
    }
    input, select {
      padding: 14px 16px;
      font-size: 1rem;
      border: 2px solid #cfd8dc;
      border-radius: 8px;
    }
    .btn {
      cursor: pointer;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1.1rem;
      border: none;
      padding: 14px 0;
      background-color: #145ca8;
      color: #fff;
    }
    .output {
      margin-top: 28px;
      min-height: 120px;
    }
    .result-card {
      border: 2px solid #4a90e2;
      border-radius: 12px;
      padding: 20px;
      background-color: #e8f0fe;
    }
    .btn-link {
      background-color: #4a90e2;
      color: #fff;
      margin-top: 12px;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 8px;
      display: inline-block;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <main class="container">
    <h1 class="title">Student Result Portal</h1>
    <p class="subtitle">Search your semester results</p>

    <form onsubmit="event.preventDefault(); searchResult();">
      <label>Enrollment Number</label>
      <input type="text" id="enroll" required />

      <label>Semester</label>
      <select id="semester" required>
        <option value="" disabled selected>Select Semester</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
      </select>

      <button class="btn">Search</button>
    </form>

    <div id="output" class="output"></div>
  </main>

<script>
const apiURL = "https://script.google.com/macros/s/AKfycbwUYpG6JZSqKxBsz20I2hd_Di3p3fFDDCtwklZaWc_d7Xyy2TeMm5RwYjEShfAVoj4t/exec";

async function searchResult() {
  const enroll = document.getElementById("enroll").value.trim();
  const sem = document.getElementById("semester").value;
  const output = document.getElementById("output");

  output.innerHTML = "Searching...";

  const url = `${apiURL}?enrollment=${encodeURIComponent(enroll)}&semester=${encodeURIComponent(sem)}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    if (data.length > 0) {
      const result = data[0];

      const pdfLink = result["PDF Link"]; // ✅ USE DIRECTLY (NO CONVERSION)

      output.innerHTML = `
        <div class="result-card">
          <h2>Result Found</h2>
          <p><strong>Course:</strong> ${result.Course}</p>
          <p><strong>Semester:</strong> ${result.Semester}</p>

          <!-- VIEW PDF (SAFE + NO 404 ISSUES) -->
          <a href="${pdfLink}" target="_blank" class="btn-link">
            View Result
          </a>

          <!-- OPTIONAL EMBED -->
          <iframe src="${pdfLink}" width="100%" height="400px"
            style="margin-top:15px; border:none; border-radius:10px;">
          </iframe>
        </div>
      `;
    } else {
      output.innerHTML = "<p>No result found</p>";
    }

  } catch (e) {
    output.innerHTML = "<p>Error loading result</p>";
  }
}
</script>

</body>
</html>
