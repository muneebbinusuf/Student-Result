<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Result Portal</title>
  <style>
    /* Reset & Base */
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #4a90e2 0%, #145ca8 100%);
      color: #222;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .container {
      background: #fff;
      max-width: 440px;
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 14px 30px rgba(20, 92, 168, 0.25);
      padding: 30px 40px;
      text-align: center;
    }
    .title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #145ca8;
    }
    .subtitle {
      font-size: 1rem;
      color: #4a90e2;
      margin-bottom: 28px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 22px;
      text-align: left;
    }
    .form-group {
      display: flex;
      flex-direction: column;
    }
    label {
      font-weight: 600;
      margin-bottom: 6px;
      color: #1a237e;
      font-size: 0.95rem;
    }
    input[type="text"],
    select {
      padding: 14px 16px;
      font-size: 1rem;
      border: 2px solid #cfd8dc;
      border-radius: 8px;
      transition: 0.3s ease;
      background: #fff;
    }
    input:focus,
    select:focus {
      border-color: #4a90e2;
      outline: none;
      box-shadow: 0 0 8px #4a90e2aa;
    }
    .btn {
      cursor: pointer;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1.1rem;
      border: none;
      padding: 14px 0;
      width: 100%;
      background-color: #145ca8;
      color: #fff;
    }
    .btn:hover {
      background-color: #0f4171;
    }
    .output {
      margin-top: 28px;
      min-height: 120px;
      font-size: 1.1rem;
      color: #333;
      text-align: left;
    }
    .loading {
      color: #4a90e2;
      font-weight: 600;
      text-align: center;
    }
    .error {
      color: #d32f2f;
      font-weight: 700;
      text-align: center;
    }
    .result-card {
      border: 2px solid #4a90e2;
      border-radius: 12px;
      padding: 20px 24px;
      background-color: #e8f0fe;
    }
    .result-card h2 {
      font-size: 1.6rem;
      margin: 0 0 14px;
      color: #0f4171;
    }
    .result-card p {
      margin: 8px 0;
    }
    .btn-link {
      background-color: #4a90e2;
      color: #fff;
      margin-top: 18px;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 8px;
      display: inline-block;
      font-weight: 700;
      font-size: 1rem;
    }
    .btn-link:hover {
      background-color: #0f4171;
    }
  </style>
</head>

<body>
  <main class="container">
    <header>
      <h1 class="title">Student Result Portal</h1>
      <p class="subtitle">Search your semester results by Enrollment No.</p>
    </header>

    <form id="resultForm" onsubmit="event.preventDefault(); searchResult();">
      <div class="form-group">
        <label for="enroll">Enrollment Number</label>
        <input type="text" id="enroll" required />
      </div>

      <div class="form-group">
        <label for="semester">Semester</label>
        <select id="semester" required>
          <option value="" disabled selected>Select Semester</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
        </select>
      </div>

      <button class="btn">Search</button>
    </form>

    <section id="output" class="output"></section>
  </main>

  <script>
    const apiURL = "https://script.google.com/macros/s/AKfycbwUYpG6JZSqKxBsz20I2hd_Di3p3fFDDCtwklZaWc_d7Xyy2TeMm5RwYjEShfAVoj4t/exec";

    async function searchResult() {
      const enroll = document.getElementById("enroll").value.trim();
      const sem = document.getElementById("semester").value;
      const output = document.getElementById("output");

      output.innerHTML = '<p class="loading">Searching results...</p>';

      if (!enroll || !sem) {
        output.innerHTML = '<p class="error">Please enter both Enrollment Number and Semester.</p>';
        return;
      }

      const url = `${apiURL}?enrollment=${encodeURIComponent(enroll)}&semester=${encodeURIComponent(sem)}`;

      try {
        const response = await fetch(url);
        const data = await response.json();

        if (data.length > 0) {
          const result = data[0];

          // ✅ FIX: convert Google Drive link to direct download
          const rawLink = result["PDF Link"];
          const pdfLink = rawLink.includes("drive.google.com")
            ? rawLink.replace("/view", "").replace("file/d/", "uc?export=download&id=").replace("/edit", "")
            : rawLink;

          output.innerHTML = `
            <article class="result-card">
              <h2>Result Found</h2>
              <p><strong>Course:</strong> ${result.Course}</p>
              <p><strong>Semester:</strong> ${sem}</p>

              <a href="${pdfLink}" class="btn-link" download>
                Download Result PDF
              </a>
            </article>
          `;
        } else {
          output.innerHTML = '<p class="error">No results found for the provided input.</p>';
        }

      } catch (error) {
        output.innerHTML = '<p class="error">Failed to fetch results. Please try again later.</p>';
      }
    }
  </script>
</body>
</html>
