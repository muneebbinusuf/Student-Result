<script>
const sheetID = "1Soy2jKf2Ap9R50iJ_5JRPBxCsFWmg4mz5H0poetTTIA";
const sheetName = "Sheet1"; // change if different

const sheetURL = `https://opensheet.elk.sh/${sheetID}/${sheetName}`;

async function searchResult() {
  const enroll = document.getElementById("enroll").value;
  const sem = document.getElementById("semester").value;

  try {
    const res = await fetch(sheetURL);
    const data = await res.json();

    let found = false;

    data.forEach(row => {
      if (row.Enrollment == enroll && row.Semester == sem) {
        found = true;
        document.getElementById("output").innerHTML =
          `Result Found <br><a href="${row["PDF Link"]}" target="_blank">Open PDF</a>`;
      }
    });

    if (!found) {
      document.getElementById("output").innerText = "Result not found";
    }

  } catch (error) {
    document.getElementById("output").innerText =
      "Error fetching data, please try again later.";
  }
}
</script>
