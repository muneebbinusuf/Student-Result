<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Result Portal</title>
  <style>
    /* Reset & Base */
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #4a90e2 0%, #145ca8 100%);
      color: #222;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .container {
      background: #fff;
      max-width: 440px;
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 14px 30px rgba(20, 92, 168, 0.25);
      padding: 30px 40px;
      box-sizing: border-box;
      text-align: center;
    }
    .title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #145ca8;
    }
    .subtitle {
      font-size: 1rem;
      color: #4a90e2;
      margin-bottom: 28px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 22px;
      text-align: left;
    }
    .form-group {
      display: flex;
      flex-direction: column;
    }
    label {
      font-weight: 600;
      margin-bottom: 6px;
      color: #1a237e;
      font-size: 0.95rem;
    }
    input[type="text"] {
      padding: 14px 16px;
      font-size: 1rem;
      border: 2px solid #cfd8dc;
      border-radius: 8px;
      transition: 0.3s ease border-color, 0.3s ease box-shadow;
    }
    input[type="text"]:focus {
      border-color: #4a90e2;
      outline: none;
      box-shadow: 0 0 8px #4a90e2aa;
    }
    .btn {
      cursor: pointer;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1.1rem;
      transition: background-color 0.3s ease;
      border: none;
      text-decoration: none;
      display: inline-block;
      padding: 14px 0;
      width: 100%;
      text-align: center;
      background-color: #145ca8;
      color: #fff;
    }
    .btn:hover,
    .btn:focus {
      background-color: #0f4171;
      outline: none;
    }
    .output {
      margin-top: 28px;
      min-height: 120px;
      font-size: 1.1rem;
      color: #333;
      text-align: left;
    }
    .loading {
      color: #4a90e2;
      font-weight: 600;
      text-align: center;
    }
    .error {
      color: #d32f2f;
      font-weight: 700;
      text-align: center;
    }
    .result-card {
      border: 2px solid #4a90e2;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 6px 18px rgba(74,144,226,0.15);
      background-color: #e8f0fe;
    }
    .result-card h2 {
      font-size: 1.6rem;
      margin: 0 0 14px;
      color: #0f4171;
    }
    .result-card p {
      margin: 8px 0;
      font-size: 1.1rem;
    }
    .btn-link {
      background-color: #4a90e2;
      color: #fff;
      margin-top: 18px;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 8px;
      display: inline-block;
      font-weight: 700;
      font-size: 1rem;
      transition: background-color 0.3s ease;
    }
    .btn-link:hover,
    .btn-link:focus {
      background-color: #0f4171;
      outline: none;
    }
    /* Responsive */
    @media (max-width: 480px) {
      body {
        padding: 20px 12px;
      }
      .container {
        padding: 25px 20px;
        max-width: 100%;
      }
      .title {
        font-size: 1.6rem;
      }
      .subtitle {
        font-size: 0.9rem;
        margin-bottom: 22px;
      }
      input[type="text"] {
        font-size: 1rem;
        padding: 12px 14px;
      }
      .btn,
      .btn-link {
        font-size: 1rem;
        padding: 12px 0;
      }
      .output {
        font-size: 1rem;
        min-height: 100px;
      }
    }
  </style>
</head>
<body>
  <main class="container" role="main">
    <header>
      <h1 class="title">Student Result Portal</h1>
      <p class="subtitle">Search your semester results by Enrollment No.</p>
    </header>

    <form id="resultForm" onsubmit="event.preventDefault(); searchResult();" novalidate>
      <div class="form-group">
        <label for="enroll">Enrollment Number</label>
        <input type="text" id="enroll" name="enroll" placeholder="Enter Enrollment Number" required minlength="3" autocomplete="off" />
      </div>

      <div class="form-group">
        <label for="semester">Semester</label>
        <input type="text" id="semester" name="semester" placeholder="Enter Semester (e.g., 1, 2, 3)" required minlength="1" autocomplete="off" />
      </div>

      <button type="submit" class="btn">Search</button>
    </form>

    <section id="output" aria-live="polite" class="output"></section>
  </main>

  <script>
    const apiURL = "https://script.google.com/macros/s/AKfycby7rg9TY_PRDtIaakrYWMQ9Q8VFjc-vsGUjxOxOTXzD91hHQuZXsgTg66l6-AhwGSTI/exec";

    async function searchResult() {
      const enroll = document.getElementById("enroll").value.trim();
      const sem = document.getElementById("semester").value.trim();
      const output = document.getElementById("output");

      output.innerHTML = '<p class="loading" aria-live="assertive">Searching results...</p>';

      if (!enroll || !sem) {
        output.innerHTML = '<p class="error">Please enter both Enrollment Number and Semester.</p>';
        return;
      }

      const url = `${apiURL}?enrollment=${encodeURIComponent(enroll)}&semester=${encodeURIComponent(sem)}`;

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Network response was not ok');
        const data = await response.json();

        if (data.length > 0) {
          const result = data[0];
          output.innerHTML = `
            <article class="result-card" tabindex="0">
              <h2>Result Found</h2>
              <p><strong>Course:</strong> ${result.Course}</p>
              <p><strong>Semester:</strong> ${sem}</p>
              <a href="${result["PDF Link"]}" target="_blank" rel="noopener noreferrer" class="btn-link" aria-label="Open Result PDF">View Result PDF</a>
            </article>
          `;
        } else {
          output.innerHTML = '<p class="error">No results found for the provided input.</p>';
        }
      } catch (error) {
        output.innerHTML = '<p class="error">Failed to fetch results. Please try again later.</p>';
      }
    }
  </script>
</body>
</html>
